name: 9eight9 Video Processor

# این بخش یعنی گیت‌هاب گوش به زنگ دستور دستی (از طرف n8n) باشد
on:
  workflow_dispatch:
    inputs:
      video_command:
        description: 'Command from n8n'
        required: true

jobs:
  execute-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Tools (ffmpeg & yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade yt-dlp

      - name: Running the Command
        # اینجا دستوری که n8n فرستاده اجرا می‌شود
        run: |
          ${{ github.event.inputs.video_command }}

      - name: Send Result to Telegram
        if: success()
        run: |
          # این خط فایل نهایی را به تلگرام تو می‌فرستد
          curl -v -F "video=@final_video.mp4" https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendVideo?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}
